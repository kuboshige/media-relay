name: Build APK

# app/ 配下（Flutterアプリ）か、このワークフロー自身が変わったときにビルドする。
# 手動実行（Actions画面の "Run workflow"）でもビルドできる。
on:
  push:
    branches:
      - "**"
    paths:
      - "app/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

# Release を作成するために書き込み権限が必要
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show versions
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app icon
        run: flutter pub run flutter_launcher_icons

      # GitHub Secret に署名キーがあれば復元する。無ければデバッグ署名でビルド継続。
      - name: Restore signing key
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$GITHUB_WORKSPACE/app/android/app/release.keystore"
            cat > "$GITHUB_WORKSPACE/app/android/key.properties" <<EOF
          storeFile=$GITHUB_WORKSPACE/app/android/app/release.keystore
          storePassword=mediarelay
          keyAlias=media-relay
          keyPassword=mediarelay
          EOF
            echo "Signing key restored: release APK will be update-installable."
          else
            echo "No ANDROID_KEYSTORE_BASE64 secret set; falling back to debug signing."
          fi

      # ビルド毎に versionCode / versionName を上げる（更新判定のため）
      - name: Build release APK
        run: flutter build apk --release --build-name=1.0.${{ github.run_number }} --build-number=${{ github.run_number }}

      # 安定したファイル名にしておく（最新版の固定URLで配布できる）
      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk media-relay.apk

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: media-relay-apk
          path: app/media-relay.apk
          if-no-files-found: error

      # GitHub Release を作成してAPKを添付（Obtainiumで更新管理／直接DL用）
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: media-relay build ${{ github.run_number }}
          files: app/media-relay.apk
          body: |
            自動ビルドのAPK。Obtainium で更新管理できます。
            最新版APK（固定リンク）:
            https://github.com/kuboshige/media-relay/releases/latest/download/media-relay.apk
